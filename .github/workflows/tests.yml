name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies + pytest
        # The browser tiers (Playwright / Camoufox / Selenium) are lazy-imported and
        # mocked in tests, so the offline suite runs on the core deps alone — no browser
        # download needed in CI.
        run: |
          python -m pip install --upgrade pip
          pip install "httpx[http2]>=0.24" "html2text>=2020.1.16" "pyyaml>=6.0" \
                      "beautifulsoup4>=4.11" "lxml>=4.9" "curl_cffi>=0.7" pytest

      - name: Run offline test suite
        run: pytest -q
